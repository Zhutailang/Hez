# Cloud LiveKit — signaling on :17880; nginx terminates TLS on 443 (/rtc) and optional :7880
port: 17880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
keys:
  APIhezdevkey: hez_dev_secret_change_me_in_production
logging:
  level: info
room:
  # Hard cap: max concurrent participants per room
  max_participants: 16
